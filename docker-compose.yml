services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: city_postgres
    environment:
      POSTGRES_USER: city
      POSTGRES_PASSWORD: city
      POSTGRES_DB: citydb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U city -d citydb"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: city_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
    container_name: city_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://city:city@postgres:5432/citydb
      REDIS_URL: redis://redis:6379/0
      API_CACHE_TTL_SEC: 600
    ports:
      - "8000:8000"

volumes:
  pg_data:
